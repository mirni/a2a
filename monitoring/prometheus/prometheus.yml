# =============================================================================
# Prometheus Configuration — A2A Commerce Platform
# =============================================================================
# TEMPLATE: Do not edit prometheus.yml directly.
# Edit this file and run scripts/run_monitor.sh to regenerate.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  # A2A Gateway — /v1/metrics endpoint (Prometheus text format)
  - job_name: "a2a-gateway"
    scheme: "https"
    metrics_path: "/v1/metrics"
    scrape_interval: 10s
    tls_config:
      insecure_skip_verify: true
    static_configs:
      - targets: ["100.116.117.117:443"]
        labels:
          instance: "gateway-primary"
          environment: "production"

  # Note: /v1/health returns JSON, not Prometheus format.
  # Gateway liveness is tracked via up{job="a2a-gateway"} instead.

  # Node Exporter — system metrics (CPU, RAM, disk, network)
  - job_name: "node-exporter"
    scrape_interval: 15s
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "gateway-host"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
