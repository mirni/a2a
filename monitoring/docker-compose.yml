# =============================================================================
# A2A Monitoring Stack — Prometheus + Grafana
# =============================================================================
# Usage:
#   cd monitoring
#   docker compose up -d
#
# Access:
#   Grafana:    http://localhost:3030  (admin / admin)
#   Prometheus: http://localhost:9090
#
# The stack scrapes metrics from the A2A gateway at the target defined in
# prometheus/prometheus.yml (generated from prometheus.yml.tmpl by run_monitor.sh).
# Default target: api.greenhelix.net:8000.  Override with A2A_GATEWAY_HOST env var.
# =============================================================================

services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: a2a-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: a2a-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3030}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/gateway-overview.json
    depends_on:
      - prometheus
      - loki

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: a2a-alertmanager
    restart: unless-stopped
    ports:
      - "${ALERTMANAGER_PORT:-9093}:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"

  loki:
    image: grafana/loki:3.1.0
    container_name: a2a-loki
    restart: unless-stopped
    ports:
      - "${LOKI_PORT:-3100}:3100"
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    command:
      - "-config.file=/etc/loki/loki.yml"

  promtail:
    image: grafana/promtail:3.1.0
    container_name: a2a-promtail
    restart: unless-stopped
    volumes:
      - ./promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/log/journal:/run/log/journal:ro
      - /etc/machine-id:/etc/machine-id:ro
    command:
      - "-config.file=/etc/promtail/promtail.yml"
    depends_on:
      - loki

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: a2a-node-exporter
    restart: unless-stopped
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"

volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
