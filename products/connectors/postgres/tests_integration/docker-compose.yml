name: a2a-pg-connector-test

services:
  db:
    image: postgres:16-alpine
    container_name: a2a-pg-connector-test
    environment:
      POSTGRES_DB: a2a_connector_test
      POSTGRES_USER: a2a_test
      POSTGRES_PASSWORD: a2a_test_pwd_local_only
      # Faster test runs: fsync off + synchronous_commit off — THROWAWAY DB ONLY
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    command:
      - "postgres"
      - "-c"
      - "fsync=off"
      - "-c"
      - "synchronous_commit=off"
      - "-c"
      - "full_page_writes=off"
      - "-c"
      - "max_connections=50"
    ports:
      - "5433:5432"
    tmpfs:
      # Throwaway volume in RAM for speed — data is lost on container stop
      - /var/lib/postgresql/data
    volumes:
      - ./seed.sql:/docker-entrypoint-initdb.d/10_seed.sql:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "a2a_test", "-d", "a2a_connector_test"]
      interval: 1s
      timeout: 3s
      retries: 20
