# =============================================================================
# A2A Commerce Platform — CI Pipeline
# =============================================================================
# Runs on pushes to main and on all pull requests.
# Tests all modules independently to catch import/isolation issues.
# Quality checks run as independent jobs so one failure doesn't block others.
#
# NOTE: push is limited to main to avoid duplicate CI runs on PR branches
# (GitHub fires both push and pull_request events for PR branch pushes).
#
# For PRs targeting main, the staging pipeline is called via workflow_call
# after all CI jobs pass, so there is a single workflow run per push.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Lint with ruff
        run: ruff check .
      - name: Check formatting with ruff
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mypy and runtime deps
        run: pip install mypy pydantic aiosqlite cryptography httpx starlette
      - name: Type check with mypy
        run: mypy $(find gateway/src products/*/src products/connectors/*/src -maxdepth 0 -type d 2>/dev/null | sort)

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - name: Security scan with bandit
        run: bandit -r gateway/src products/ -ll -q --skip B101,B108,B608 --exclude '*/tests/*'

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps and audit tool
        run: |
          pip install pip-audit
          pip install -r requirements.txt
      - name: Dependency audit
        run: pip-audit

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: SAST with Semgrep
        run: semgrep scan --config auto --error --exclude='**/tests/**' .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: scripts/ci/install_deps.sh --with-test

      - name: Test server health
        run: ./check_server.sh
        continue-on-error: true

      - name: Create coverage directory
        run: mkdir -p coverage

      - name: Test gateway
        run: scripts/run_tests.sh gateway --cov=gateway --cov-report=xml:coverage/gateway.xml --cov-fail-under=70

      - name: Test billing
        run: scripts/run_tests.sh products/billing --cov=src --cov-report=xml:coverage/billing.xml

      - name: Test paywall
        run: scripts/run_tests.sh products/paywall --cov=src --cov-report=xml:coverage/paywall.xml

      - name: Test payments
        run: scripts/run_tests.sh products/payments --cov=src --cov-report=xml:coverage/payments.xml

      - name: Test marketplace
        run: scripts/run_tests.sh products/marketplace --cov=src --cov-report=xml:coverage/marketplace.xml

      - name: Test trust
        run: scripts/run_tests.sh products/trust --cov=src --cov-report=xml:coverage/trust.xml

      - name: Test shared
        run: scripts/run_tests.sh products/shared --cov=src --cov-report=xml:coverage/shared.xml

      - name: Test identity
        run: scripts/run_tests.sh products/identity --cov=src --cov-report=xml:coverage/identity.xml

      - name: Test messaging
        run: scripts/run_tests.sh products/messaging --cov=src --cov-report=xml:coverage/messaging.xml

      - name: Test reputation
        run: scripts/run_tests.sh products/reputation --cov=src --cov-report=xml:coverage/reputation.xml

      - name: Coverage summary
        if: always()
        run: |
          pip install coverage
          # Combine coverage data from all modules into a single report
          coverage combine --keep coverage/*.xml 2>/dev/null || true
          echo "## Coverage by module" >> $GITHUB_STEP_SUMMARY
          echo "| Module | Coverage |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|----------|" >> $GITHUB_STEP_SUMMARY
          for f in coverage/*.xml; do
            mod=$(basename "$f" .xml)
            pct=$(python3 -c "
          import xml.etree.ElementTree as ET
          try:
              tree = ET.parse('$f')
              rate = float(tree.getroot().attrib.get('line-rate', 0))
              print(f'{rate*100:.1f}%')
          except: print('N/A')
          ")
            echo "| $mod | $pct |" >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage/*.xml
          retention-days: 14

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and verify Docker image
        run: scripts/ci/docker_build_verify.sh

  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: pip install wheel setuptools

      - name: Build all packages
        run: scripts/create_package.sh ALL

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dist/*.deb
          retention-days: 14

      - name: Upload SDK wheel
        uses: actions/upload-artifact@v4
        with:
          name: sdk-wheel
          path: dist/*.whl
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Staging deploy (PRs targeting main only, after all CI jobs pass)
  # ---------------------------------------------------------------------------
  staging:
    needs: [lint, typecheck, security, dependency-audit, semgrep, test, docker-build, package]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    uses: ./.github/workflows/staging.yml
    secrets: inherit
