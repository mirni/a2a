# =============================================================================
# A2A Commerce Platform — CI Pipeline (Lightweight)
# =============================================================================
# Runs when a PR is marked ready for review (or opened as non-draft) and on
# merge queue events. Does NOT run on every push to a PR branch.
# Skips docs-only changes via paths-ignore.
# Three jobs: quality, test, package — then staging for PRs targeting main.
#
# For full CI (SAST, docker, multi-Python), see release.yml which runs on
# release/* branches.
# =============================================================================

name: CI

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths-ignore:
      - 'docs/**'
      - 'reports/**'
      - 'tasks/**'
      - 'plans/**'
      - 'logs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
  merge_group:

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Quality: linting, formatting, type checking, security scan
  # ---------------------------------------------------------------------------
  quality:
    if: github.event.pull_request.draft == false || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install tools and runtime deps
        run: pip install ruff mypy bandit pydantic aiosqlite cryptography httpx fastapi

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy $(find gateway/src products/*/src products/connectors/*/src -maxdepth 0 -type d 2>/dev/null | sort)

      - name: Security scan with bandit
        run: bandit -r gateway/src products/ -ll -q --skip B101,B108,B608 --exclude '*/tests/*'

  # ---------------------------------------------------------------------------
  # Test: all modules on Python 3.12 with coverage
  # ---------------------------------------------------------------------------
  test:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-

      - name: Install dependencies
        run: scripts/ci/install_deps.sh --with-test

      - name: Test server health
        run: ./check_server.sh
        continue-on-error: true

      - name: Test gateway
        run: scripts/run_tests.sh gateway --cov=gateway --cov-fail-under=70

      - name: Test billing
        run: scripts/run_tests.sh products/billing

      - name: Test paywall
        run: scripts/run_tests.sh products/paywall

      - name: Test payments
        run: scripts/run_tests.sh products/payments

      - name: Test marketplace
        run: scripts/run_tests.sh products/marketplace

      - name: Test trust
        run: scripts/run_tests.sh products/trust

      - name: Test shared
        run: scripts/run_tests.sh products/shared

      - name: Test identity
        run: scripts/run_tests.sh products/identity

      - name: Test messaging
        run: scripts/run_tests.sh products/messaging

  # ---------------------------------------------------------------------------
  # Package: build debs + SDK wheel
  # ---------------------------------------------------------------------------
  package:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: pip install wheel setuptools

      - name: Build all packages
        run: scripts/create_package.sh ALL

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deb-packages
          path: dist/*.deb
          retention-days: 14

      - name: Upload SDK wheel
        uses: actions/upload-artifact@v4
        with:
          name: sdk-wheel
          path: dist/*.whl
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Staging deploy (PRs targeting main only, after all CI jobs pass)
  # ---------------------------------------------------------------------------
  staging:
    needs: [quality, test, package]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    uses: ./.github/workflows/staging.yml
    secrets: inherit
