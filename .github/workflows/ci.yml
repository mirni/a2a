# =============================================================================
# A2A Commerce Platform — CI Pipeline (Lightweight)
# =============================================================================
# Runs on PRs (opened, synchronized, ready_for_review), merge queue events,
# and pushes to main (for coverage baseline updates only — all other jobs
# are skipped on push via the `if:` guard below).
# Skips docs-only changes via paths-ignore.
# Three jobs: quality, test, package — then staging for PRs targeting main.
#
# For full CI (SAST, docker, multi-Python), see release.yml which runs on
# release/* branches.
# =============================================================================

name: CI

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    paths-ignore:
      - 'docs/**'
      - 'reports/**'
      - 'tasks/**'
      - 'plans/**'
      - 'logs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'
  merge_group:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'reports/**'
      - 'tasks/**'
      - 'plans/**'
      - 'logs/**'
      - '*.md'
      - '.gitignore'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Quality: linting, formatting, type checking, security scan
  # ---------------------------------------------------------------------------
  quality:
    if: github.event.pull_request.draft == false || github.event_name == 'merge_group'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools and runtime deps
        run: pip install ruff mypy bandit pydantic aiosqlite cryptography httpx fastapi mcp pip-audit

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy $(find gateway/src products/*/src products/connectors/*/src -maxdepth 0 -type d 2>/dev/null | sort)

      - name: Security scan with bandit
        run: bandit -r gateway/src products/ -ll -q --skip B101,B108,B608 --exclude '*/tests/*'

      - name: SAST with semgrep
        continue-on-error: true  # Non-blocking while findings are triaged
        uses: docker://semgrep/semgrep
        with:
          args: semgrep scan --config auto --error --exclude='**/tests/**' --exclude='**/node_modules/**' .

      - name: Dependency audit
        run: pip-audit -r requirements.txt

      - name: Version sync check (VERSION ↔ gateway/sdk/sdk-ts)
        run: python scripts/sync_versions.py --check

      - name: Pydantic forbid-extras lint (request models)
        run: python scripts/lint_pydantic_forbid.py --quiet

      - name: Float-money lint (Decimal-only money paths)
        run: python scripts/lint_no_float_money.py --quiet

      - name: Bootstrap import-order smoke test
        run: python scripts/test_bootstrap.py

      # NOTE: the old "Website stats in sync with catalog" check was
      # removed. website/*.html now ship literal placeholders
      # ({{TOTAL_TOOLS}}, {{NUM_SERVICES}}, {{VERSION}}) between the
      # <!-- a2a:stats:... --> markers and scripts/create_package.sh
      # substitutes real values into a staged copy at package-build
      # time — the source tree can't drift so there's nothing to
      # check here. See the placeholder guardrail test in
      # scripts/tests/test_update_website_stats.py.

  # ---------------------------------------------------------------------------
  # Test: gateway sharded across 3 parallel jobs × Python versions
  # ---------------------------------------------------------------------------
  test-gateway:
    needs: [quality]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        shard: [0, 1, 2]
    name: test-gateway (py${{ matrix.python-version }}, shard ${{ matrix.shard }})
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: scripts/ci/install_deps.sh --with-test

      - name: Install z3-solver for gatekeeper metrics tests
        # Gateway integration tests exercise MockVerifierClient → in-process
        # Z3 when VERIFIER_AUTH_MODE is unset (default fallback). Without
        # z3-solver the gatekeeper metrics route records "error" instead of
        # "satisfied" and the histogram assertions fail.
        run: pip install 'z3-solver==4.13.4.0'

      - name: Test server health
        run: ./check_server.sh
        continue-on-error: true

      - name: Determine shard test files
        run: |
          FILES=$(python scripts/ci/shard_tests.py gateway/tests/ ${{ matrix.shard }} 3 | tr '\n' ' ')
          echo "SHARD_FILES=$FILES" >> "$GITHUB_ENV"

      - name: Test gateway (shard ${{ matrix.shard }})
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest $SHARD_FILES \
            -x -q --tb=short \
            --cov=gateway \
            --cov-report=xml:coverage-gateway-${{ matrix.shard }}.xml \
            --cov-report=term-missing

      - name: Upload coverage XML
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml-gateway-${{ matrix.shard }}
          path: coverage-gateway-*.xml
          retention-days: 7

  test-products:
    needs: [quality]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    name: test-products (py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: scripts/ci/install_deps.sh --with-test

      - name: Test billing
        run: scripts/run_tests.sh products/billing --cov=products/billing/src --cov-report=xml:coverage-billing.xml --cov-report=term-missing

      - name: Test paywall
        run: scripts/run_tests.sh products/paywall --cov=products/paywall/src --cov-report=xml:coverage-paywall.xml --cov-report=term-missing

      - name: Test payments
        run: scripts/run_tests.sh products/payments --cov=products/payments/src --cov-report=xml:coverage-payments.xml --cov-report=term-missing

      - name: Test marketplace
        run: scripts/run_tests.sh products/marketplace --cov=products/marketplace/src --cov-report=xml:coverage-marketplace.xml --cov-report=term-missing

      - name: Test trust
        run: scripts/run_tests.sh products/trust --cov=products/trust/src --cov-report=xml:coverage-trust.xml --cov-report=term-missing

      - name: Test shared
        run: scripts/run_tests.sh products/shared --cov=products/shared/src --cov-report=xml:coverage-shared.xml --cov-report=term-missing

      - name: Test identity
        run: scripts/run_tests.sh products/identity --cov=products/identity/src --cov-report=xml:coverage-identity.xml --cov-report=term-missing

      - name: Test messaging
        run: scripts/run_tests.sh products/messaging --cov=products/messaging/src --cov-report=xml:coverage-messaging.xml --cov-report=term-missing

      - name: Install mcp SDK + z3-solver for mcp_server tests
        # z3-solver is needed because the MCP gatekeeper integration tests
        # spin up the full gateway, which now uses MockVerifierClient by
        # default (VERIFIER_AUTH_MODE unset → in-process Z3 fallback).
        run: pip install 'mcp>=1.0' 'z3-solver==4.13.4.0'

      - name: Test mcp_server
        run: scripts/run_tests.sh products/mcp_server --cov=products/mcp_server/src --cov-report=xml:coverage-mcp_server.xml --cov-report=term-missing

      - name: Upload coverage XML
        if: always() && matrix.python-version == '3.12'
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml-products
          path: coverage-*.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # TypeScript MCP server: build + test @greenhelix/mcp-server
  # ---------------------------------------------------------------------------
  test-mcp-server-ts:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
      - name: Install TS MCP server deps
        working-directory: sdk-ts/mcp-server
        run: npm ci
      - name: Build TS MCP server
        working-directory: sdk-ts/mcp-server
        run: npm run build
      - name: Test TS MCP server
        working-directory: sdk-ts/mcp-server
        run: npm test

  # ---------------------------------------------------------------------------
  # Lambda handler: Z3 verifier unit tests (pure Python, no AWS)
  # ---------------------------------------------------------------------------
  test-lambda-handler:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install z3-solver==4.13.4.0 pytest
      - name: Test Lambda handler
        run: python -m pytest lambda/z3-verifier/tests/ -x -q

      - name: Test Z3 invariant harnesses (FV-1..6)
        run: python -m pytest products/gatekeeper/tests/test_invariants.py --noconftest -x -q

  # ---------------------------------------------------------------------------
  # Coverage ratchet: separate job so it's a distinct required check
  # ---------------------------------------------------------------------------
  coverage:
    needs: [test-gateway, test-products]
    if: always() && needs.test-gateway.result == 'success' && needs.test-products.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore coverage baseline from cache
        id: baseline-cache
        uses: actions/cache/restore@v5
        with:
          path: .coverage-baseline.json
          key: coverage-baseline

      - name: Download gateway coverage XML
        uses: actions/download-artifact@v7
        with:
          pattern: coverage-xml-gateway-*
          merge-multiple: true

      - name: Download products coverage XML
        uses: actions/download-artifact@v7
        with:
          name: coverage-xml-products

      - name: Merge gateway shard coverage XMLs
        run: |
          python scripts/ci/merge_coverage_xml.py \
            coverage-gateway-*.xml \
            -o coverage-gateway.xml
          rm -f coverage-gateway-[0-9]*.xml

      - name: Coverage ratchet check
        shell: bash {0}
        run: |
          python scripts/ci/coverage_ratchet.py check \
            --markdown=/tmp/coverage-comment.md \
            coverage-*.xml \
            > /tmp/coverage-report.txt 2>&1
          RATCHET_EXIT=$?
          cat /tmp/coverage-report.txt
          exit $RATCHET_EXIT

      - name: Coverage summary
        if: always()
        run: |
          echo '## Coverage Ratchet Report' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/coverage-report.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No report generated" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Post coverage comment on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f /tmp/coverage-comment.md ]; then
            echo "No coverage comment file found — skipping."
            exit 0
          fi
          # Try to update existing comment, fall back to creating a new one
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/coverage-comment.md \
            --edit-last 2>/dev/null \
          || gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file /tmp/coverage-comment.md

      - name: Update coverage baseline (main only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: python scripts/ci/coverage_ratchet.py update coverage-*.xml

      - name: Delete stale baseline cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.baseline-cache.outputs.cache-hit == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh cache delete coverage-baseline || true

      - name: Save updated baseline to cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/cache/save@v5
        with:
          path: .coverage-baseline.json
          key: coverage-baseline

  # ---------------------------------------------------------------------------
  # Integration tests: run e2e_tests.py against a locally-started gateway
  # Runs on PRs and pushes to main — blocks merge to main on failure.
  # ---------------------------------------------------------------------------
  integration:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-

      - name: Install dependencies
        run: scripts/ci/install_deps.sh --with-test

      - name: Start gateway
        run: scripts/ci/start_gateway.sh
        env:
          GATEWAY_HOST: 127.0.0.1
          GATEWAY_PORT: "8000"

      - name: Provision admin API key
        id: provision
        run: |
          KEY=$(python scripts/ci/provision_admin_key.py \
            --data-dir "$A2A_DATA_DIR" \
            --agent-id e2e-admin \
            --balance 1000000)
          echo "::add-mask::$KEY"
          echo "A2A_API_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Run integration smoke test
        env:
          A2A_BASE_URL: http://127.0.0.1:8000
          A2A_API_KEY: ${{ env.A2A_API_KEY }}
        run: python scripts/ci/integration_smoke.py

      - name: Stop gateway
        if: always()
        run: |
          if [[ -n "${SERVER_PID:-}" ]]; then
            kill "$SERVER_PID" 2>/dev/null || true
          fi

  # ---------------------------------------------------------------------------
  # Postgres connector: live-DB integration tests (non-blocking)
  # ---------------------------------------------------------------------------
  postgres-integration:
    needs: [quality]
    runs-on: ubuntu-latest
    continue-on-error: true  # Non-blocking while stabilising
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: a2a_connector_test
          POSTGRES_USER: a2a_test
          POSTGRES_PASSWORD: a2a_test_pwd_local_only
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U a2a_test -d a2a_connector_test"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    env:
      PG_HOST: localhost
      PG_PORT: "5433"
      PG_DATABASE: a2a_connector_test
      PG_USER: a2a_test
      PG_PASSWORD: a2a_test_pwd_local_only
      PG_READ_ONLY: "false"
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install "pytest>=8" "pytest-asyncio>=0.23" "asyncpg>=0.30" "pydantic>=2.0"

      - name: Install psql client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Seed database
        env:
          PGPASSWORD: a2a_test_pwd_local_only
        run: |
          psql -h localhost -p 5433 -U a2a_test -d a2a_connector_test \
            -v ON_ERROR_STOP=1 \
            -f products/connectors/postgres/tests_integration/seed.sql

      - name: Run integration tests
        run: scripts/run_pg_connector_tests.sh

      - name: Show pytest log on failure
        if: failure()
        run: |
          echo "::group::Last 200 lines of any pytest output"
          find /tmp -name "*.log" -newer /tmp -mmin -10 2>/dev/null -exec tail -n 200 {} + || true
          echo "::endgroup::"

  # ---------------------------------------------------------------------------
  # Package: build debs + SDK wheel
  # ---------------------------------------------------------------------------
  package:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: pip install wheel setuptools

      - name: Build all packages
        run: scripts/create_package.sh ALL

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v6
        with:
          name: deb-packages
          path: dist/*.deb
          retention-days: 14

      - name: Upload SDK wheel
        uses: actions/upload-artifact@v6
        with:
          name: sdk-wheel
          path: dist/*.whl
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Post-package smoke test: extract .deb, boot the gateway, probe endpoints.
  # Catches packaging regressions BEFORE staging deploy, not after.
  # ---------------------------------------------------------------------------
  smoke-package:
    needs: [package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download deb artifacts
        uses: actions/download-artifact@v7
        with:
          name: deb-packages
          path: dist/

      - name: Install runtime deps
        run: scripts/ci/install_deps.sh --with-test

      - name: Smoke test built deb
        run: scripts/ci/smoke_test_deb.sh "$(ls dist/a2a-gateway_*.deb | head -1)"

  # ---------------------------------------------------------------------------
  # Sandbox parity: run the audit-probe test suite against the live sandbox.
  #
  # v1.2.4 audit T-3: catches regressions that only manifest behind
  # Cloudflare/nginx/TLS. Skips cleanly when the required secrets are
  # absent (e.g. forks, pre-provisioning) so the job never blocks
  # unrelated PRs. Once SANDBOX_AUDIT_*_KEY secrets are populated,
  # flip continue-on-error to false and mark it required.
  # See tasks/backlog/sandbox-audit-keys.md for provisioning steps.
  # ---------------------------------------------------------------------------
  sandbox-parity:
    needs: [quality]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    runs-on: ubuntu-latest
    continue-on-error: true  # Non-blocking until sandbox keys are provisioned
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install "pytest>=8" "pytest-asyncio>=0.23" "httpx>=0.27"

      - name: Run sandbox parity suite
        env:
          A2A_SANDBOX_URL: https://sandbox.greenhelix.net
          SANDBOX_AUDIT_FREE_KEY: ${{ secrets.SANDBOX_AUDIT_FREE_KEY }}
          SANDBOX_AUDIT_PRO_KEY: ${{ secrets.SANDBOX_AUDIT_PRO_KEY }}
          SANDBOX_AUDIT_ADMIN_KEY: ${{ secrets.SANDBOX_AUDIT_ADMIN_KEY }}
        run: |
          if [ -z "$SANDBOX_AUDIT_FREE_KEY" ] || [ -z "$SANDBOX_AUDIT_PRO_KEY" ] || [ -z "$SANDBOX_AUDIT_ADMIN_KEY" ]; then
            echo "::warning::Sandbox audit keys not configured — skipping parity suite."
            echo "Set SANDBOX_AUDIT_FREE_KEY, SANDBOX_AUDIT_PRO_KEY, SANDBOX_AUDIT_ADMIN_KEY as repo secrets."
            exit 0
          fi
          python -m pytest tests/sandbox/ -v --tb=short

  # ---------------------------------------------------------------------------
  # Staging deploy (PRs targeting main only, after all CI jobs pass)
  # ---------------------------------------------------------------------------
  staging:
    needs: [quality, test-gateway, test-products, integration, package, smoke-package, coverage]
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    uses: ./.github/workflows/staging.yml
    secrets: inherit
