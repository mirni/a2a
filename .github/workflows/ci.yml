# =============================================================================
# A2A Commerce Platform — CI Pipeline
# =============================================================================
# Runs on every push and pull request to main.
# Tests all modules independently to catch import/isolation issues.
# Quality checks run as independent jobs so one failure doesn't block others.
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - name: Lint with ruff
        run: ruff check .
      - name: Check formatting with ruff
        run: ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mypy and runtime deps
        run: pip install mypy pydantic aiosqlite cryptography httpx starlette
      - name: Type check with mypy
        run: mypy $(find gateway/src products/*/src products/connectors/*/src -maxdepth 0 -type d 2>/dev/null | sort)

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit
      - name: Security scan with bandit
        run: bandit -r gateway/src products/ -ll -q --skip B101 --exclude '*/tests/*'

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps and audit tool
        run: |
          pip install pip-audit
          pip install -r requirements.txt
      - name: Dependency audit
        run: pip-audit

  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      - name: SAST with Semgrep
        run: semgrep scan --config auto --error --exclude='**/tests/**' .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: scripts/ci/install_deps.sh --with-test

      - name: Test server health
        run: ./check_server.sh

      - name: Test gateway
        run: scripts/run_tests.sh gateway --cov=gateway --cov-fail-under=70

      - name: Test billing
        run: scripts/run_tests.sh products/billing

      - name: Test paywall
        run: scripts/run_tests.sh products/paywall

      - name: Test payments
        run: scripts/run_tests.sh products/payments

      - name: Test marketplace
        run: scripts/run_tests.sh products/marketplace

      - name: Test trust
        run: scripts/run_tests.sh products/trust

      - name: Test shared
        run: scripts/run_tests.sh products/shared

      - name: Test identity
        run: scripts/run_tests.sh products/identity

      - name: Test messaging
        run: scripts/run_tests.sh products/messaging

      - name: Test reputation
        run: scripts/run_tests.sh products/reputation

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and verify Docker image
        run: scripts/ci/docker_build_verify.sh
