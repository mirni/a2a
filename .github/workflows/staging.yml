# =============================================================================
# A2A Commerce Platform — Staging Pipeline
# =============================================================================
# Called by CI and Release workflows (workflow_call) after all checks pass.
# Single consolidated job: deploy → smoke test → report to PR.
# =============================================================================

name: Staging

on:
  workflow_call:

jobs:
  staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download deb artifacts
        uses: actions/download-artifact@v7
        with:
          name: deb-packages
          path: dist/

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          # Detect format: PEM starts with -----, otherwise assume base64
          if [[ "$SSH_KEY" == -----* ]]; then
            printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          else
            echo "$SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          # Validate key (try empty passphrase explicitly)
          if ! ssh-keygen -y -P "" -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::DEPLOY_SSH_KEY is invalid or passphrase-protected"
            echo "File: $(wc -c < ~/.ssh/deploy_key) bytes, $(wc -l < ~/.ssh/deploy_key) lines"
            echo "Header: $(head -1 ~/.ssh/deploy_key)"
            echo "Generate a new key: ssh-keygen -t ed25519 -f deploy_key -N ''"
            exit 1
          fi
          cat >> ~/.ssh/config << 'EOF'
          Host *
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/deploy_key
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy to staging
        run: |
          scripts/deploy.sh \
            --host "${{ secrets.TAILSCALE_IP }}" \
            --deb "$(ls dist/a2a-gateway-test_*.deb | head -1)" \
            --component a2a-gateway-test \
            --health-url "https://test.greenhelix.net/v1/health" \
          || {
            echo "::group::Server diagnostics (journalctl)"
            ssh root@"${{ secrets.TAILSCALE_IP }}" \
              "journalctl -u a2a-gateway-test --no-pager -n 80 --since '5 minutes ago'" 2>&1 || true
            echo "::endgroup::"
            echo "::group::Server diagnostics (systemctl status)"
            ssh root@"${{ secrets.TAILSCALE_IP }}" \
              "systemctl status a2a-gateway-test --no-pager -l" 2>&1 || true
            echo "::endgroup::"
            exit 1
          }

      - name: Install test dependencies
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps and run smoke test
        run: |
          scripts/ci/install_deps.sh --with-test
          python scripts/stress_test.py \
            --base-url "https://test.greenhelix.net" \
            --customers 5 \
            --duration 15

      - name: Post staging result to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            // Determine outcome from previous steps
            const deployStep = '${{ steps.deploy.outcome }}' || 'unknown';
            const jobStatus = '${{ job.status }}';
            const icon = jobStatus === 'success' ? '✅' : '❌';
            const status = jobStatus === 'success' ? 'PASSED' : 'FAILED';

            const body = [
              `## ${icon} Staging ${status}`,
              '',
              `| Step | Result |`,
              `|------|--------|`,
              `| Deploy to staging | ${jobStatus !== 'cancelled' ? (jobStatus === 'success' ? '✅' : '❌') : '⏭️'} |`,
              `| Smoke tests | ${jobStatus === 'success' ? '✅' : '❌'} |`,
              '',
              `> Tested at \`https://test.greenhelix.net\``,
              `> Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            // Only post if this is a PR context
            if (context.issue && context.issue.number) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
