# =============================================================================
# A2A Commerce Platform — Staging Pipeline
# =============================================================================
# Triggered on pull requests targeting main, after CI passes.
# Deploys the test gateway package to the staging server
# and runs smoke tests before allowing merge.
# =============================================================================

name: Staging

on:
  pull_request:
    branches: [main]

concurrency:
  group: staging-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Wait for CI to pass before proceeding
  # ---------------------------------------------------------------------------
  ci-check:
    runs-on: ubuntu-latest
    steps:
      - name: CI status gate
        run: echo "CI checks are enforced via required status checks on the PR"

  # ---------------------------------------------------------------------------
  # Build all packages
  # ---------------------------------------------------------------------------
  package:
    runs-on: ubuntu-latest
    needs: [ci-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: pip install wheel setuptools

      - name: Build all packages
        run: scripts/create_package.sh ALL

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-deb-packages
          path: dist/*.deb
          retention-days: 7

      - name: Upload SDK wheel
        uses: actions/upload-artifact@v4
        with:
          name: staging-sdk-wheel
          path: dist/*.whl
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Deploy test gateway to staging server
  # ---------------------------------------------------------------------------
  staging-deploy:
    runs-on: ubuntu-latest
    needs: [package]
    steps:
      - name: Download deb artifacts
        uses: actions/download-artifact@v4
        with:
          name: staging-deb-packages
          path: dist/

      - name: Deploy to staging server
        env:
          STAGING_SSH_KEY: ${{ secrets.STAGING_SSH_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
        run: |
          # Set up SSH
          mkdir -p ~/.ssh
          echo "$STAGING_SSH_KEY" > ~/.ssh/staging_key
          chmod 600 ~/.ssh/staging_key
          ssh-keyscan -H "$STAGING_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          SSH_OPTS="-o StrictHostKeyChecking=accept-new -i ~/.ssh/staging_key"

          # Upload the test gateway deb
          DEB_FILE=$(ls dist/a2a-gateway-test_*.deb | head -1)
          scp $SSH_OPTS "$DEB_FILE" "root@${STAGING_HOST}:/tmp/"

          # Install and verify service starts
          DEB_BASENAME=$(basename "$DEB_FILE")
          ssh $SSH_OPTS "root@${STAGING_HOST}" bash -s << REMOTE
            set -euo pipefail
            dpkg -i "/tmp/${DEB_BASENAME}" || apt-get install -f -y
            sleep 3
            systemctl is-active a2a-gateway-test
            rm -f "/tmp/${DEB_BASENAME}"
          REMOTE

          # Clean up SSH key
          rm -f ~/.ssh/staging_key

  # ---------------------------------------------------------------------------
  # Smoke tests against the staging server
  # ---------------------------------------------------------------------------
  staging-smoke:
    runs-on: ubuntu-latest
    needs: [staging-deploy]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: scripts/ci/install_deps.sh --with-test

      - name: Health check
        run: |
          # Retry health check up to 10 times (service may still be starting)
          for i in $(seq 1 10); do
            if curl -sf "https://test.greenhelix.net/v1/health" -o /dev/null; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying in 5s..."
            sleep 5
          done
          echo "Health check failed after 10 attempts"
          exit 1

      - name: Smoke test (lightweight stress)
        run: |
          python scripts/stress_test.py \
            --base-url "https://test.greenhelix.net" \
            --customers 5 \
            --duration 15

  # ---------------------------------------------------------------------------
  # Report results back to the PR
  # ---------------------------------------------------------------------------
  staging-report:
    runs-on: ubuntu-latest
    needs: [staging-smoke]
    if: always()
    steps:
      - name: Post staging result to PR
        uses: actions/github-script@v7
        with:
          script: |
            const smokeResult = '${{ needs.staging-smoke.result }}';
            const deployResult = '${{ needs.staging-deploy.result }}';
            const icon = smokeResult === 'success' ? '✅' : '❌';
            const status = smokeResult === 'success' ? 'PASSED' : 'FAILED';

            const body = [
              `## ${icon} Staging ${status}`,
              '',
              `| Step | Result |`,
              `|------|--------|`,
              `| Deploy to staging | ${deployResult === 'success' ? '✅' : '❌'} ${deployResult} |`,
              `| Smoke tests | ${smokeResult === 'success' ? '✅' : '❌'} ${smokeResult} |`,
              '',
              `> Tested at \`https://test.greenhelix.net\``,
              `> Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
