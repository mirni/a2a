# =============================================================================
# A2A Commerce Platform — Release Pipeline (Full)
# =============================================================================
# Runs on pushes to release/* branches (created by scripts/release.sh).
# Full pipeline: quality, SAST, tests, docker build, packaging, staging.
#
# release.sh step 7 polls `gh run list --branch release/X.Y.Z` waiting for
# this workflow to complete before triggering deploy-production.yml.
# =============================================================================

name: Release

on:
  push:
    branches: ['release/*']

permissions:
  contents: read
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Quality: linting, formatting, type checking, security scan
  # ---------------------------------------------------------------------------
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tools and runtime deps
        run: pip install ruff mypy bandit pydantic aiosqlite cryptography httpx fastapi

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

      - name: Type check with mypy
        run: mypy $(find gateway/src products/*/src products/connectors/*/src -maxdepth 0 -type d 2>/dev/null | sort)

      - name: Security scan with bandit
        run: bandit -r gateway/src products/ -ll -q --skip B101,B108,B608 --exclude '*/tests/*'

  # ---------------------------------------------------------------------------
  # SAST: semgrep + dependency audit
  # ---------------------------------------------------------------------------
  sast:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: SAST with Semgrep
        uses: docker://semgrep/semgrep
        with:
          args: semgrep scan --config auto --error --exclude='**/tests/**' .

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps and audit tool
        run: |
          pip install pip-audit
          pip install -r requirements.txt

      - name: Dependency audit
        run: pip-audit

  # ---------------------------------------------------------------------------
  # Test: gateway sharded across 3 parallel jobs × Python versions
  # ---------------------------------------------------------------------------
  test-gateway:
    needs: [quality]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
        shard: [0, 1, 2]
    name: test-gateway (py${{ matrix.python-version }}, shard ${{ matrix.shard }})
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: scripts/ci/install_deps.sh --with-test

      - name: Test server health
        run: ./check_server.sh
        continue-on-error: true

      - name: Determine shard test files
        run: |
          FILES=$(python scripts/ci/shard_tests.py gateway/tests/ ${{ matrix.shard }} 3 | tr '\n' ' ')
          echo "SHARD_FILES=$FILES" >> "$GITHUB_ENV"

      - name: Test gateway (shard ${{ matrix.shard }})
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python -m pytest $SHARD_FILES \
            -x -q --tb=short \
            --cov=gateway \
            --cov-report=xml:coverage-gateway-${{ matrix.shard }}.xml \
            --cov-report=term-missing

      # Per-shard coverage ratchet is skipped — each shard only covers ~1/3 of
      # lines. The full ratchet runs in the CI workflow's unified coverage job.

  test-products:
    needs: [quality]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    name: test-products (py${{ matrix.python-version }})
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: scripts/ci/install_deps.sh --with-test

      - name: Test billing
        run: scripts/run_tests.sh products/billing --cov=products/billing/src --cov-report=xml:coverage-billing.xml --cov-report=term-missing

      - name: Test paywall
        run: scripts/run_tests.sh products/paywall --cov=products/paywall/src --cov-report=xml:coverage-paywall.xml --cov-report=term-missing

      - name: Test payments
        run: scripts/run_tests.sh products/payments --cov=products/payments/src --cov-report=xml:coverage-payments.xml --cov-report=term-missing

      - name: Test marketplace
        run: scripts/run_tests.sh products/marketplace --cov=products/marketplace/src --cov-report=xml:coverage-marketplace.xml --cov-report=term-missing

      - name: Test trust
        run: scripts/run_tests.sh products/trust --cov=products/trust/src --cov-report=xml:coverage-trust.xml --cov-report=term-missing

      - name: Test shared
        run: scripts/run_tests.sh products/shared --cov=products/shared/src --cov-report=xml:coverage-shared.xml --cov-report=term-missing

      - name: Test identity
        run: scripts/run_tests.sh products/identity --cov=products/identity/src --cov-report=xml:coverage-identity.xml --cov-report=term-missing

      - name: Test messaging
        run: scripts/run_tests.sh products/messaging --cov=products/messaging/src --cov-report=xml:coverage-messaging.xml --cov-report=term-missing

      - name: Coverage ratchet check (products)
        if: matrix.python-version == '3.12'
        run: python scripts/ci/coverage_ratchet.py check coverage-*.xml | tee /tmp/coverage-report.txt

      - name: Coverage summary
        if: always() && matrix.python-version == '3.12'
        run: |
          echo '## Coverage Ratchet Report (Products)' >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/coverage-report.txt >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "No report generated" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Docker: build image and verify health check
  # ---------------------------------------------------------------------------
  docker-build:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build and verify Docker image
        run: scripts/ci/docker_build_verify.sh

  # ---------------------------------------------------------------------------
  # Package: build debs + SDK wheel
  # ---------------------------------------------------------------------------
  package:
    needs: [quality]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: pip install wheel setuptools

      - name: Build all packages
        run: scripts/create_package.sh ALL

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v6
        with:
          name: deb-packages
          path: dist/*.deb
          retention-days: 14

      - name: Upload SDK wheel
        uses: actions/upload-artifact@v6
        with:
          name: sdk-wheel
          path: dist/*.whl
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Staging: deploy + smoke test (single consolidated job)
  # ---------------------------------------------------------------------------
  staging:
    needs: [quality, sast, test-gateway, test-products, docker-build, package]
    uses: ./.github/workflows/staging.yml
    secrets: inherit
