# =============================================================================
# A2A Commerce Platform — Production Deployment
# =============================================================================
# Deploy selected components to production with approval gate and auto-rollback.
# Triggered via workflow_dispatch on main or release/* branches.
#
# Components:
#   a2a-gateway  — Production API gateway (systemd service)
#   a2a-website  — Static website (nginx)
#   all          — Both gateway and website
# =============================================================================

name: Deploy Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true
      component:
        description: "Component to deploy"
        required: true
        type: choice
        options:
          - all
          - a2a-gateway
          - a2a-website
        default: all

jobs:
  # ---------------------------------------------------------------------------
  # Guard: require main or release/* branch + explicit confirmation
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    outputs:
      deploy_gateway: ${{ steps.check.outputs.deploy_gateway }}
      deploy_website: ${{ steps.check.outputs.deploy_website }}
    steps:
      - name: Validate branch and confirmation
        id: check
        env:
          GIT_REF: ${{ github.ref }}
          CONFIRM: ${{ github.event.inputs.confirm }}
          COMPONENT: ${{ github.event.inputs.component }}
        run: |
          # Allow main and release/* branches
          if [[ "$GIT_REF" != "refs/heads/main" && ! "$GIT_REF" =~ ^refs/heads/release/ ]]; then
            echo "::error::Production deployments can only be triggered from main or release/* branches"
            exit 1
          fi

          if [[ "$CONFIRM" != "deploy" ]]; then
            echo "::error::Confirmation required: type 'deploy' to proceed"
            exit 1
          fi

          # Set component flags
          if [[ "$COMPONENT" == "all" || "$COMPONENT" == "a2a-gateway" ]]; then
            echo "deploy_gateway=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_gateway=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "$COMPONENT" == "all" || "$COMPONENT" == "a2a-website" ]]; then
            echo "deploy_website=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_website=false" >> "$GITHUB_OUTPUT"
          fi

          echo "Deploying component=$COMPONENT from ref=$GIT_REF"

  # ---------------------------------------------------------------------------
  # Gate: verify Release pipeline passed (release/* branches only)
  # ---------------------------------------------------------------------------
  release-gate:
    runs-on: ubuntu-latest
    needs: [validate]
    if: startsWith(github.ref, 'refs/heads/release/')
    steps:
      - name: Wait for Release workflow to succeed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="${GITHUB_REF#refs/heads/}"
          MAX_WAIT=900   # 15 minutes
          POLL=15        # seconds between checks
          ELAPSED=0

          echo "Waiting for Release workflow on branch: $BRANCH"

          while (( ELAPSED < MAX_WAIT )); do
            RUN_JSON=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow "Release" \
              --branch "$BRANCH" \
              --limit 1 \
              --json databaseId,conclusion,status \
              --jq '.[0] // empty')

            if [[ -z "$RUN_JSON" ]]; then
              echo "No Release workflow run found yet (${ELAPSED}s / ${MAX_WAIT}s)..."
              sleep "$POLL"
              ELAPSED=$((ELAPSED + POLL))
              continue
            fi

            STATUS=$(echo "$RUN_JSON" | jq -r '.status')
            CONCLUSION=$(echo "$RUN_JSON" | jq -r '.conclusion // "null"')
            RUN_ID=$(echo "$RUN_JSON" | jq -r '.databaseId')

            echo "Release run $RUN_ID: status=$STATUS conclusion=$CONCLUSION (${ELAPSED}s / ${MAX_WAIT}s)"

            if [[ "$STATUS" == "completed" ]]; then
              if [[ "$CONCLUSION" == "success" ]]; then
                echo "Release workflow passed — proceeding with deployment"
                exit 0
              else
                echo "::error::Release workflow (run $RUN_ID) concluded with '$CONCLUSION' — cannot deploy"
                exit 1
              fi
            fi

            sleep "$POLL"
            ELAPSED=$((ELAPSED + POLL))
          done

          echo "::error::Timed out waiting for Release workflow after ${MAX_WAIT}s"
          exit 1

  # ---------------------------------------------------------------------------
  # Build selected packages
  # ---------------------------------------------------------------------------
  package:
    runs-on: ubuntu-latest
    needs: [validate, release-gate]
    if: always() && needs.validate.result == 'success' && (needs.release-gate.result == 'success' || needs.release-gate.result == 'skipped')
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install packaging tools
        run: pip install wheel setuptools

      - name: Build common package
        run: scripts/create_package.sh a2a-common

      - name: Build gateway package
        if: needs.validate.outputs.deploy_gateway == 'true'
        run: scripts/create_package.sh a2a-gateway

      - name: Build website package
        if: needs.validate.outputs.deploy_website == 'true'
        run: scripts/create_package.sh a2a-website

      - name: Upload deb artifacts
        uses: actions/upload-artifact@v6
        with:
          name: production-debs
          path: dist/*.deb
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Deploy gateway (requires manual approval via GitHub environment)
  # ---------------------------------------------------------------------------
  deploy-gateway:
    runs-on: ubuntu-latest
    needs: [validate, package]
    if: needs.validate.outputs.deploy_gateway == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Download deb artifacts
        uses: actions/download-artifact@v7
        with:
          name: production-debs
          path: dist/

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          # Detect format: PEM starts with -----, otherwise assume base64
          if [[ "$SSH_KEY" == -----* ]]; then
            printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          else
            echo "$SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          # Validate key (try empty passphrase explicitly)
          if ! ssh-keygen -y -P "" -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::DEPLOY_SSH_KEY is invalid or passphrase-protected"
            echo "File: $(wc -c < ~/.ssh/deploy_key) bytes, $(wc -l < ~/.ssh/deploy_key) lines"
            echo "Header: $(head -1 ~/.ssh/deploy_key)"
            echo "Generate a new key: ssh-keygen -t ed25519 -f deploy_key -N ''"
            exit 1
          fi
          cat >> ~/.ssh/config << 'EOF'
          Host *
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/deploy_key
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy gateway
        run: |
          scripts/deploy.sh \
            --host "${{ secrets.TAILSCALE_IP }}" \
            --pre-deb "$(ls dist/a2a-common_*.deb | head -1)" \
            --deb "$(ls dist/a2a-gateway_*.deb | head -1)" \
            --component a2a-gateway \
            --health-url "https://api.greenhelix.net/v1/health"

  # ---------------------------------------------------------------------------
  # Deploy website
  # ---------------------------------------------------------------------------
  deploy-website:
    runs-on: ubuntu-latest
    needs: [validate, package]
    if: needs.validate.outputs.deploy_website == 'true'
    environment: production
    steps:
      - uses: actions/checkout@v5

      - name: Download deb artifacts
        uses: actions/download-artifact@v7
        with:
          name: production-debs
          path: dist/

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          # Detect format: PEM starts with -----, otherwise assume base64
          if [[ "$SSH_KEY" == -----* ]]; then
            printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          else
            echo "$SSH_KEY" | base64 -d > ~/.ssh/deploy_key
          fi
          chmod 600 ~/.ssh/deploy_key
          # Validate key (try empty passphrase explicitly)
          if ! ssh-keygen -y -P "" -f ~/.ssh/deploy_key > /dev/null 2>&1; then
            echo "::error::DEPLOY_SSH_KEY is invalid or passphrase-protected"
            echo "File: $(wc -c < ~/.ssh/deploy_key) bytes, $(wc -l < ~/.ssh/deploy_key) lines"
            echo "Header: $(head -1 ~/.ssh/deploy_key)"
            echo "Generate a new key: ssh-keygen -t ed25519 -f deploy_key -N ''"
            exit 1
          fi
          cat >> ~/.ssh/config << 'EOF'
          Host *
            StrictHostKeyChecking accept-new
            IdentityFile ~/.ssh/deploy_key
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy website
        run: |
          scripts/deploy.sh \
            --host "${{ secrets.TAILSCALE_IP }}" \
            --pre-deb "$(ls dist/a2a-common_*.deb | head -1)" \
            --deb "$(ls dist/a2a-website_*.deb | head -1)" \
            --component a2a-website \
            --no-verify

  # ---------------------------------------------------------------------------
  # Post-deploy smoke tests
  # ---------------------------------------------------------------------------
  smoke:
    runs-on: ubuntu-latest
    needs: [validate, deploy-gateway, deploy-website]
    # Run if at least one deploy job ran (skip if both were skipped)
    if: always() && (needs.deploy-gateway.result == 'success' || needs.deploy-website.result == 'success')
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: scripts/ci/install_deps.sh --with-test

      - name: Post-deploy smoke tests
        if: needs.deploy-gateway.result == 'success'
        env:
          STRESS_ADMIN_KEY: ${{ secrets.STRESS_ADMIN_KEY }}
        run: |
          python scripts/stress_test.py \
            --base-url "https://api.greenhelix.net" \
            --customers 5 \
            --duration 15 \
            --admin-key "$STRESS_ADMIN_KEY"

