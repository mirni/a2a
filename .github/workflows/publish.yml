# =============================================================================
# A2A Commerce Platform — Publish SDKs to PyPI + npm
# =============================================================================
# Triggered by version tags pushed by release.sh (step 10), or manually via:
#   gh workflow run Publish -f version=1.2.3
# Uses trusted publishing (OIDC) for PyPI and a granular access token for npm.
#
# Setup required (one-time, manual):
#
# PyPI Trusted Publisher:
#   1. https://pypi.org/manage/project/a2a-greenhelix-sdk/settings/publishing/
#   2. Add publisher: owner=mirni, repo=a2a, workflow=publish.yml, environment=pypi
#
# GitHub Environments:
#   1. Create environment "pypi" (no secrets needed — uses OIDC)
#   2. Create environment "npm" with secret NPM_TOKEN
#
# npm Granular Access Token:
#   1. https://www.npmjs.com/ → Access Tokens → Granular Access Token
#   2. Scope to @greenhelix/sdk, read+write permissions
#   3. Store as NPM_TOKEN in GitHub "npm" environment
# =============================================================================

name: Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.2.3) — tag v<version> must exist'
        required: true
        type: string

jobs:
  # ---------------------------------------------------------------------------
  # Validate: extract version from tag, verify it matches SDK sources
  # ---------------------------------------------------------------------------
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version
        id: extract
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - uses: actions/checkout@v4
        with:
          ref: v${{ steps.extract.outputs.version }}

      - name: Verify sdk/pyproject.toml version
        env:
          EXPECTED: ${{ steps.extract.outputs.version }}
        run: |
          ACTUAL=$(python3 -c "
          import re, pathlib
          text = pathlib.Path('sdk/pyproject.toml').read_text()
          m = re.search(r'^version\s*=\s*\"([^\"]+)\"', text, re.MULTILINE)
          print(m.group(1) if m else 'NOT_FOUND')
          ")
          echo "sdk/pyproject.toml version: $ACTUAL (expected: $EXPECTED)"
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "::error::Version mismatch: sdk/pyproject.toml has $ACTUAL, tag is v$EXPECTED"
            exit 1
          fi

      - name: Verify sdk-ts/package.json version
        env:
          EXPECTED: ${{ steps.extract.outputs.version }}
        run: |
          ACTUAL=$(node -p "require('./sdk-ts/package.json').version")
          echo "sdk-ts/package.json version: $ACTUAL (expected: $EXPECTED)"
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "::error::Version mismatch: sdk-ts/package.json has $ACTUAL, tag is v$EXPECTED"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Publish Python SDK to PyPI via Trusted Publishing (OIDC)
  # ---------------------------------------------------------------------------
  publish-pypi:
    needs: validate
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # OIDC for Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.validate.outputs.version }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist and wheel
        run: |
          pip install --quiet build
          cd sdk
          python -m build --sdist --wheel --outdir ../dist/pypi/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/pypi/

  # ---------------------------------------------------------------------------
  # Publish TypeScript SDK to npm with provenance (bypasses OTP)
  # ---------------------------------------------------------------------------
  publish-npm:
    needs: validate
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      id-token: write   # OIDC for npm provenance attestation
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.validate.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      # Pre-flight: fail fast with an actionable error BEFORE spending
      # time on build + provenance signing if the NPM_TOKEN secret is
      # missing, expired, or lacks publish scope on @greenhelix/sdk.
      # Motivation: releases v1.2.4 and v1.2.5 both failed the
      # ``npm publish`` step with npm's misleading
      # ``E404 PUT @greenhelix/sdk — not in this registry`` error,
      # which is almost always a token permission/expiry issue, not
      # an actual 404. Surfacing the root cause here saves ~60s per
      # retry and points the human operator at the exact secret.
      - name: Pre-flight — verify NPM_TOKEN can publish @greenhelix/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -u
          if [[ -z "${NODE_AUTH_TOKEN:-}" ]]; then
            echo "::error::NPM_TOKEN secret is empty. Set it in the 'npm' GitHub environment with a granular access token that has read-write permission on @greenhelix/sdk."
            exit 1
          fi

          WHOAMI_OUT=$(npm whoami --registry=https://registry.npmjs.org 2>&1)
          WHOAMI_RC=$?
          if [[ $WHOAMI_RC -ne 0 ]]; then
            echo "::error::npm whoami failed — the NPM_TOKEN is invalid or expired."
            echo "::error::Rotate the token at https://www.npmjs.com/settings/~/tokens (granular access token, 'read and write' on @greenhelix/sdk, 1 year expiry), then update the 'NPM_TOKEN' secret in the GitHub 'npm' environment."
            echo "whoami output: $WHOAMI_OUT"
            exit 1
          fi
          echo "Authenticated as: $WHOAMI_OUT"

          # Confirm publish scope on the exact package.
          #
          # IMPORTANT: do NOT use ``npm access list packages --json`` here.
          # Granular access tokens do not receive the "list all org
          # packages" permission and npm returns E403 for that call, so
          # the JSON we'd parse is an error object, not a package map.
          # The per-package ``list collaborators`` command, by contrast,
          # IS allowed for granular tokens and returns exactly the
          # user→permission map we need:
          #
          #   { "greenhelix-mirni": "read-write" }
          #
          # We then assert that the authenticated user appears with
          # ``read-write`` on @greenhelix/sdk.
          ACCESS_JSON=$(npm access list collaborators @greenhelix/sdk --json 2>/dev/null || echo '{}')
          HAS_WRITE=$(printf '%s' "$ACCESS_JSON" | WHOAMI="$WHOAMI_OUT" node -e '
            let data = "";
            process.stdin.on("data", c => data += c);
            process.stdin.on("end", () => {
              try {
                const m = JSON.parse(data);
                const user = process.env.WHOAMI;
                const perm = m[user] || "";
                process.stdout.write(perm === "read-write" ? "yes" : "no:" + perm);
              } catch (e) {
                process.stdout.write("parse-error");
              }
            });
          ' <<< "$ACCESS_JSON")

          if [[ "$HAS_WRITE" != "yes" ]]; then
            echo "::error::NPM_TOKEN does NOT have read-write on @greenhelix/sdk (got: $HAS_WRITE)."
            echo "::error::Recreate the granular access token with 'Packages and scopes: @greenhelix' and 'Permissions: Read and write'."
            echo "collaborators output: $ACCESS_JSON"
            exit 1
          fi
          echo "NPM_TOKEN has read-write on @greenhelix/sdk — proceeding."

      - name: Install and build
        working-directory: sdk-ts
        run: |
          npm ci
          npm run build

      - name: Publish with provenance
        working-directory: sdk-ts
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ---------------------------------------------------------------------------
  # Publish Docker image to Docker Hub
  #
  # Until v1.2.6 the Docker image was pushed from the release engineer's
  # laptop via ``scripts/release.sh --publish-docker`` because the token
  # only existed in their ``.env``. That coupled releases to one
  # machine and meant a tag landing on GitHub did not produce a Docker
  # image unless someone remembered to run the local script. Moving the
  # publish into CI uses the ``dockerhub`` environment (secret:
  # ``DOCKER_DEPLOYMENT_TOKEN`` — a Docker Hub access token scoped to
  # user ``greenhelix`` with read/write on ``greenhelix/a2a-gateway``)
  # so every tag on ``v*`` ships an image automatically.
  # ---------------------------------------------------------------------------
  publish-docker:
    needs: validate
    runs-on: ubuntu-latest
    environment: dockerhub
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ needs.validate.outputs.version }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: greenhelix
          password: ${{ secrets.DOCKER_DEPLOYMENT_TOKEN }}

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            greenhelix/a2a-gateway:${{ needs.validate.outputs.version }}
            greenhelix/a2a-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Verify: install published packages from registries
  # ---------------------------------------------------------------------------
  verify:
    needs: [validate, publish-pypi, publish-npm, publish-docker]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for registry propagation
        run: sleep 30

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Verify PyPI package
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          python3 -m venv /tmp/verify-venv
          /tmp/verify-venv/bin/pip install --quiet "a2a-greenhelix-sdk==${VERSION}"
          /tmp/verify-venv/bin/python -c "from a2a_client import A2AClient; print('PyPI: import OK')"

      - name: Verify npm package
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          mkdir /tmp/verify-npm && cd /tmp/verify-npm
          npm init -y --silent
          npm install "@greenhelix/sdk@${VERSION}" --silent
          node -e "const { A2AClient } = require('@greenhelix/sdk'); console.log('npm: import OK')"

      - name: Verify Docker image
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          docker pull "greenhelix/a2a-gateway:${VERSION}"
          docker image inspect "greenhelix/a2a-gateway:${VERSION}" --format 'Docker: {{.Id}} OK'
