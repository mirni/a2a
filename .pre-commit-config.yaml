repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-r, -ll, -q, --skip, B101]
        files: ^(gateway/src|products)/

  - repo: local
    hooks:
      - id: update-website-stats
        name: Sync website stats from catalog.json
        entry: python scripts/update_website_stats.py --write
        language: system
        files: ^(gateway/src/catalog\.json|gateway/src/_version\.py|website/.*\.html)$
        pass_filenames: false
