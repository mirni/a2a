[mypy]
python_version = 3.12
# Pragmatic type checking: catch real bugs without requiring full annotations
warn_return_any = false
warn_unused_configs = true
warn_unused_ignores = false
ignore_missing_imports = true
explicit_package_bases = true
check_untyped_defs = true
disallow_incomplete_defs = true
# Suppress noisy error codes until full type coverage is added
disable_error_code = union-attr, no-untyped-def, attr-defined, index

# Exclude test files and generated code
exclude = (?x)(
    /tests/
    | /e2e_tests\.py$
    )
